<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCraftHub: Your Learning Management Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #f5f3ff 0%, #fffbeb 100%);
      min-height: 100vh;
      color: #1f2937;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, #8B5CF6 0%, #7c3aed 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    header p {
      opacity: 0.9;
      font-size: 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #8B5CF6;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 500;
      margin-bottom: 6px;
      color: #374151;
      font-size: 0.875rem;
    }

    input, textarea, select {
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #8B5CF6;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #7c3aed;
      transform: translateY(-1px);
    }

    .btn-success {
      background: #F59E0B;
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      background: #d97706;
    }

    .btn-danger {
      background: #EF4444;
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #dc2626;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #4b5563;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 0.875rem;
    }

    .form-actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .course-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .course-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }

    .course-header {
      background: linear-gradient(135deg, #8B5CF6 0%, #a78bfa 100%);
      color: white;
      padding: 16px;
    }

    .course-header h3 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .course-body {
      padding: 16px;
    }

    .course-description {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .course-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .course-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .status-not-started {
      background: #fef3c7;
      color: #92400e;
    }

    .status-in-progress {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-completed {
      background: #d1fae5;
      color: #065f46;
    }

    .course-actions {
      padding: 12px 16px;
      background: #f9fafb;
      display: flex;
      gap: 8px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loading-content {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .loading-content .spinner {
      width: 30px;
      height: 30px;
      border-color: rgba(139, 92, 246, 0.3);
      border-top-color: #8B5CF6;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 1001;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast-success {
      background: #10b981;
    }

    .toast-error {
      background: #EF4444;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.25rem;
      color: #8B5CF6;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6b7280;
      padding: 4px;
      line-height: 1;
    }

    .modal-close:hover {
      color: #1f2937;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 8px;
      color: #374151;
    }

    .error-text {
      color: #EF4444;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      header h1 {
        font-size: 1.5rem;
      }

      .container {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      .courses-grid {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CodeCraftHub</h1>
    <p>Your Learning Management Platform</p>
  </header>

  <div class="container">
    <div class="card">
      <h2 class="card-title">Add New Course</h2>
      <form id="courseForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Course Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter course name">
            <span class="error-text" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="target_date">Target Date *</label>
            <input type="date" id="target_date" name="target_date" required>
            <span class="error-text" id="target_dateError"></span>
          </div>
          <div class="form-group">
            <label for="status">Status *</label>
            <select id="status" name="status" required>
              <option value="">Select status</option>
              <option value="Not Started">Not Started</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
            <span class="error-text" id="statusError"></span>
          </div>
          <div class="form-group full-width">
            <label for="description">Description *</label>
            <textarea id="description" name="description" required placeholder="Enter course description"></textarea>
            <span class="error-text" id="descriptionError"></span>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            Add Course
          </button>
          <button type="button" class="btn btn-secondary" id="resetBtn" style="display: none;">
            Cancel Edit
          </button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2 class="card-title">Your Courses</h2>
      <div id="coursesContainer">
        <div class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          <h3>No courses yet</h3>
          <p>Add your first course using the form above</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/courses';

    let courses = [];
    let editingId = null;

    const form = document.getElementById('courseForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const coursesContainer = document.getElementById('coursesContainer');

    function showLoading(message = 'Loading...') {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `
        <div class="loading-content">
          <div class="spinner"></div>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function hideLoading() {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.remove();
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function getStatusClass(status) {
      switch (status) {
        case 'Not Started': return 'status-not-started';
        case 'In Progress': return 'status-in-progress';
        case 'Completed': return 'status-completed';
        default: return '';
      }
    }

    function validateForm() {
      let isValid = true;
      const fields = ['name', 'description', 'target_date', 'status'];

      fields.forEach(field => {
        const input = document.getElementById(field);
        const error = document.getElementById(`${field}Error`);
        error.textContent = '';

        if (!input.value.trim()) {
          error.textContent = `${field.replace('_', ' ')} is required`;
          isValid = false;
        }
      });

      return isValid;
    }

    function clearForm() {
      form.reset();
      editingId = null;
      submitBtn.textContent = 'Add Course';
      resetBtn.style.display = 'none';
      document.querySelectorAll('.error-text').forEach(el => el.textContent = '');
    }

    async function fetchCourses() {
      try {
        showLoading('Loading courses...');
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        courses = await response.json();
        renderCourses();
      } catch (error) {
        console.error('Error fetching courses:', error);
        showToast('Failed to load courses. Please check if the API server is running.', 'error');
        renderCourses();
      } finally {
        hideLoading();
      }
    }

    async function createCourse(courseData) {
      try {
        showLoading('Creating course...');
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(courseData)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || `HTTP error! status: ${response.status}`);
        }

        const newCourse = await response.json();
        courses.push(newCourse);
        renderCourses();
        showToast('Course added successfully!');
        return true;
      } catch (error) {
        console.error('Error creating course:', error);
        showToast(`Failed to create course: ${error.message}`, 'error');
        return false;
      } finally {
        hideLoading();
      }
    }

    async function updateCourse(id, courseData) {
      try {
        showLoading('Updating course...');
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(courseData)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || `HTTP error! status: ${response.status}`);
        }

        const updatedCourse = await response.json();
        courses = courses.map(c => c.id === id ? updatedCourse : c);
        renderCourses();
        showToast('Course updated successfully!');
        return true;
      } catch (error) {
        console.error('Error updating course:', error);
        showToast(`Failed to update course: ${error.message}`, 'error');
        return false;
      } finally {
        hideLoading();
      }
    }

    async function deleteCourse(id) {
      if (!confirm('Are you sure you want to delete this course?')) return;

      try {
        showLoading('Deleting course...');
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        courses = courses.filter(c => c.id !== id);
        renderCourses();
        showToast('Course deleted successfully!');
      } catch (error) {
        console.error('Error deleting course:', error);
        showToast('Failed to delete course. Please try again.', 'error');
      } finally {
        hideLoading();
      }
    }

    function editCourse(course) {
      editingId = course.id;
      document.getElementById('name').value = course.name || '';
      document.getElementById('description').value = course.description || '';
      document.getElementById('target_date').value = course.target_date || '';
      document.getElementById('status').value = course.status || '';

      submitBtn.textContent = 'Update Course';
      resetBtn.style.display = 'inline-flex';

      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderCourses() {
      if (courses.length === 0) {
        coursesContainer.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <h3>No courses yet</h3>
            <p>Add your first course using the form above</p>
          </div>
        `;
        return;
      }

      coursesContainer.innerHTML = `
        <div class="courses-grid">
          ${courses.map(course => `
            <div class="course-card">
              <div class="course-header">
                <h3>${escapeHtml(course.name)}</h3>
              </div>
              <div class="course-body">
                <p class="course-description">${escapeHtml(course.description)}</p>
                <div class="course-meta">
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                      <line x1="16" y1="2" x2="16" y2="6"></line>
                      <line x1="8" y1="2" x2="8" y2="6"></line>
                      <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    ${formatDate(course.target_date)}
                  </span>
                  <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Created: ${formatDate(course.created_at)}
                  </span>
                </div>
                <div style="margin-top: 12px;">
                  <span class="status-badge ${getStatusClass(course.status)}">${escapeHtml(course.status)}</span>
                </div>
              </div>
              <div class="course-actions">
                <button class="btn btn-success btn-sm" onclick="editCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                  Edit
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteCourse(${course.id})">
                  Remove
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!validateForm()) return;

      const courseData = {
        name: document.getElementById('name').value.trim(),
        description: document.getElementById('description').value.trim(),
        target_date: document.getElementById('target_date').value,
        status: document.getElementById('status').value
      };

      let success;
      if (editingId) {
        success = await updateCourse(editingId, courseData);
      } else {
        success = await createCourse(courseData);
      }

      if (success) {
        clearForm();
      }
    });

    resetBtn.addEventListener('click', clearForm);

    fetchCourses();
  </script>
</body>
</html>
